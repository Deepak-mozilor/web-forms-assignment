<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <form>
            <fieldset>
                <legend>Account Information</legend>

                <label for="full-name">Enter Full Name</label>
                <input type="text" id="full-name" name="full-name" required autocomplete="name">
                <br>

                <label for="username">Enter Username</label>
                <input type="text" id="username" name="username" required autocomplete="username">
                <br>
                
                <label for="email">Enter Your Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">
                <br>

                <label for="password">Enter Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
                <br>

                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required autocomplete="new-password">
                <br>
            </fieldset>

            <fieldset>
                <legend>Contact information</legend>

                <label for="phone-number">Enter Phone Number</label>
                <input type="tel" id="phone-number" name="phone-number" required maxlength="10" minlength="10" autocomplete="tel">
                <br>

                <label for="company-name">Enter Company Name(Optional)</label>
                <input type="text" id="company-name" name="company-name" autocomplete="organization">
                <br>

                <label for="website">Enter Company Website(optional)</label>
                <input type="url" id="website" name="website">
                <br>

            </fieldset>

            <fieldset>
                <legend>Billing Information</legend>

                <label for="billing-name">Enter Billing Name</label>
                <input type="text" id="billing-name" name="billing-name" required autocomplete="billing name">
                <br>

                <label for="b-email">Enter Your Email</label>
                <input type="email" id="b-email" name="b-email" required autocomplete="billing email">
                <br>

                <label for="address-one">Address Line 1</label>
                <input type="text" id="address-one" name="address-one" required autocomplete="address-line1">
                <br>

                <label for="city">City</label>
                <input type="text" id="city" name="city" required autocomplete="address-level2">
                <br>

                <label for="state">State</label>
                <input type="text" id="state" name="state" required autocomplete="address-level1">
                <br>

                <label for="postal-code">Postal Code</label>
                <input type="text" id="postal-code" name="postal-code" required autocomplete="postal-code">
                <br>

                <label for="country">Country</label>
                <select id="country" name="country" required autocomplete="country">
                    <option value="" disabled selected>Select Country</option>
                    <option value="AM">America</option>
                    <option value="AF">Afganistan</option>
                    <option value="AL">Albania</option>
                    <option value="IN">India</option>
                    <option value="CH">China</option>
                    <option value="RU">Russia</option>
                </select>
                <br>

                <label for="address-two">Address Line 2(optional)</label>
                <input type="text" id="address-two" name="address-two" autocomplete="address-line2">

                <br>
            </fieldset>

            <fieldset>
                <legend>Payment Information</legend>

                <label for="card-holder-name">Card Holder Name</label>
                <input type="text" id="card-holder-name" required name="card-holder-name" autocomplete="cc-name">
                <br>

                <label for="card-number">Card Number</label>
                <input type="text" id="card-number" required name="card-number" autocomplete="cc-number">
                <br>

                <label for="expiry-date">Expiry Date</label>
                <input type="month" id="expiry-date" required name="expiry-date" autocomplete="cc-exp">
                <br>

                <label for="cvv">CVV</label>
                <input type="password" id="cvv" required name="cvv" autocomplete="cc-csc">
                <br>
            </fieldset>

            <button type="submit">Submit</button>
        </form>
    </main>
</body>
</html>
